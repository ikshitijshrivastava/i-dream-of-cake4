<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I Dream of Cake</title>
<link rel="manifest" href="manifest.json">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:#0d0f14;color:#e8eaf0;}

/* NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:#161920;border-top:1px solid #2a2f3a;
  display:flex;z-index:45;
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:8px;color:#7a8099;font-size:11px;
}
.bnav-item.active{color:#f0a500;}

/* PAGE */
.page{display:none;padding:10px 14px 80px;}
.page.active{display:block;}

/* BUTTON */
.btn{
  background:#1e2229;border:1px solid #2a2f3a;
  color:#fff;padding:8px;border-radius:6px;
}
.btn-gold{background:#f0a500;color:#000;}
.btn-purple{background:#6c5ce7;}
.card{
  background:#161920;border:1px solid #2a2f3a;
  padding:10px;margin:6px 0;border-radius:8px;
}
</style>
</head>

<body>

<!-- ================= EXISTING HOME PAGE ================= -->
<div id="pageHome" class="page active">
  <h2>Orders Dashboard</h2>
  <p>Your existing system continues here...</p>
</div>

<!-- ================= INVENTORY PAGE ================= -->
<div id="pageInventory" class="page">

  <h2>📦 Inventory</h2>

  <div style="margin-bottom:10px;">
    <button class="btn btn-gold" onclick="openAddStock()">+ Add Stock</button>
    <button class="btn btn-purple" onclick="openReconcile()">Reconcile</button>
    <button class="btn" onclick="invExportCSV()">Export CSV</button>
    <input type="file" onchange="handleImport(event)">
  </div>

  <div id="inventoryList"></div>

</div>

<!-- ================= NAVIGATION ================= -->
<div class="bottom-nav">

  <div class="bnav-item active" onclick="switchPage('home')">
    🏠 Home
  </div>

  <div class="bnav-item" onclick="switchPage('inventory')">
    📦 Inventory
  </div>

</div>

<!-- ================= SCRIPTS ================= -->

<script src="inventory-core.js"></script>
<script src="inventory-ui.js"></script>

<script>

// ===== PAGE SWITCH =====
function switchPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.bnav-item').forEach(x=>x.classList.remove('active'));

  document.getElementById('page'+capitalize(p)).classList.add('active');
  event.target.classList.add('active');

  if(p === 'inventory'){
    renderInventoryUI();
  }
}

function capitalize(s){
  return s.charAt(0).toUpperCase()+s.slice(1);
}

// ===== ADD STOCK =====
function openAddStock(){
  let item = prompt("Item?");
  let qty = prompt("Qty?");
  let batch = prompt("Batch?");
  let expiry = prompt("Expiry YYYY-MM-DD?");
  let warehouse = prompt("Warehouse?");

  invAddStock({
    item, qty:Number(qty),
    batch, expiry, warehouse
  });

  renderInventoryUI();
}

// ===== RECONCILE =====
function openReconcile(){
  let item = prompt("Item?");
  let physical = prompt("Physical Qty?");
  let ref = prompt("Invoice / Waybill?");

  let r = invReconcile(item, Number(physical), ref);

  alert("System: "+r.systemQty+
        "\\nPhysical: "+r.physicalQty+
        "\\nDiff: "+r.diff);

  renderInventoryUI();
}

// ===== IMPORT =====
function handleImport(e){
  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function(){
    invImportCSV(reader.result);
    renderInventoryUI();
  };

  reader.readAsText(file);
}

// ===== DAMAGE / RETURN / CLAIM =====
function testDamage(){
  invAdjust('damage','Cake Base',2,'Broken');
}
function testReturn(){
  invAdjust('return','Cake Base',1,'Customer Return');
}
function testClaim(){
  invAdjust('claim','Cake Base',1,'Supplier Claim');
}

// ===== SAMPLE ORDER LINK =====
function saveOrder(){
  let item = "Cake Base";

  // deduct inventory
  invConsume(item,1);

  alert("Order saved + stock deducted");
}

</script>

</body>
</html>
